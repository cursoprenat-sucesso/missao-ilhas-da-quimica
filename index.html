<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PRENAT+ | Missão Ilhas da Química</title>
  <meta name="description" content="Jogo gamificado PRENAT+ para treino de Química com mapa, ilhas, vidas, estrelas, XP e painel do professor." />
  <link rel="stylesheet" href="style-quimica.css?v=3" />
  <script>
    window.MathJax = { tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] }, svg: { fontCache: 'global' } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="student-body chemistry-body">
  <div class="chem-ocean" aria-hidden="true">
    <span class="chem-glow glow-1"></span>
    <span class="chem-glow glow-2"></span>
    <span class="chem-wave wave-1"></span>
    <span class="chem-wave wave-2"></span>
    <span class="chem-bubble bubble-1"></span>
    <span class="chem-bubble bubble-2"></span>
    <span class="chem-bubble bubble-3"></span>
  </div>

  <header class="topbar student-topbar">
    <div class="brand-area">
      <img id="brandLogo" class="brand-logo" src="logo-prenat.png" alt="PRENAT+" onerror="this.style.display='none'" />
      <div>
        <strong id="brandName">PRENAT+</strong>
        <span id="missionMini">Missão Ilhas da Química</span>
      </div>
    </div>
    <button id="resetProgress" class="btn btn-ghost">Recomeçar missão</button>
  </header>

  <main id="app" class="app-shell chemistry-shell">
    <section class="loading-card glass-card">
      <div class="loader-orb"></div>
      <h1>Carregando arquipélago químico...</h1>
      <p>Preparando ilhas, XP, estrelas e desafios da tartaruga PRENAT+.</p>
    </section>
  </main>

  <template id="homeTemplate">
    <section class="chem-hero fade-in">
      <article class="mission-gate chemistry-gate glass-card">
        <div class="mission-logo-mark">
          <img class="mission-logo-img" src="logo-prenat.png" alt="PRENAT+" onerror="this.style.display='none'" />
          <div class="mission-compass">⚗️</div>
        </div>
        <p class="kicker" data-bind="missionKicker"></p>
        <h1 data-bind="missionName"></h1>
        <p class="hero-subtitle" data-bind="subtitle"></p>
        <p class="hero-intro" data-bind="intro"></p>
        <div class="hero-actions">
          <button class="btn btn-primary btn-pulse" data-action="continue">Iniciar/continuar travessia</button>
          <button class="btn btn-soft" data-action="view-map">Ver mapa químico</button>
        </div>
        <div class="flow-note" data-bind="studentThemeNote"></div>
      </article>

      <aside class="player-dashboard glass-card">
        <div class="rank-orb premium-medal" data-rank-icon></div>
        <div class="rank-card-inner">
          <span class="tiny-label">Patente atual</span>
          <h2 data-rank-name></h2>
          <p data-rank-description></p>
        </div>
        <div class="resource-row">
          <div class="resource-pill"><span>XP</span><strong data-xp-total>0</strong></div>
          <div class="resource-pill"><span>Moedas</span><strong data-coin-total>0</strong></div>
          <div class="resource-pill"><span>Estrelas</span><strong data-star-total>0/0</strong></div>
        </div>
        <div class="evolution-strip" data-evolution-strip aria-label="Itens de evolução conquistados"></div>
        <div class="progress-ring" aria-label="Progresso da missão">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" class="ring-bg"></circle>
            <circle cx="60" cy="60" r="50" class="ring-value" data-progress-circle></circle>
          </svg>
          <strong data-progress-text>0%</strong>
        </div>
        <p class="progress-caption" data-progress-caption></p>
      </aside>
    </section>

    <section id="mapa" class="map-card chemistry-map-card glass-card fade-in">
      <div class="section-title-row">
        <div>
          <span class="kicker">Mapa do arquipélago químico</span>
          <h2>Escolha a próxima ilha</h2>
        </div>
        <span class="badge-pill" data-bind="missionName"></span>
      </div>
      <div class="map-story" data-map-story></div>
      <div class="legend-row">
        <span><i class="legend-dot open"></i> Aberta</span>
        <span><i class="legend-dot locked"></i> Bloqueada</span>
        <span><i class="legend-dot done"></i> Conquistada</span>
        <span>⭐⭐⭐⭐⭐ = domínio máximo</span>
      </div>
      <div class="route-wrap">
        <svg class="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <path class="route-shadow" d="M8 11 C24 20 12 33 30 24 S43 9 56 13 S67 30 79 28 S93 35 84 47 S60 43 52 58 S28 51 24 67 S40 87 55 84 S67 68 84 70 S90 85 82 91" />
          <path class="route-main" d="M8 11 C24 20 12 33 30 24 S43 9 56 13 S67 30 79 28 S93 35 84 47 S60 43 52 58 S28 51 24 67 S40 87 55 84 S67 68 84 70 S90 85 82 91" />
          <path class="route-done" d="M8 11 C24 20 12 33 30 24 S43 9 56 13 S67 30 79 28 S93 35 84 47 S60 43 52 58 S28 51 24 67 S40 87 55 84 S67 68 84 70 S90 85 82 91" />
        </svg>
        <div class="route-map" data-island-map></div>
      </div>
    </section>
  </template>

  <template id="quizTemplate">
    <section class="quiz-layout fade-in">
      <aside class="quiz-sidebar glass-card">
        <button class="btn btn-ghost small" data-action="back-home">← Voltar ao mapa</button>
        <span class="tiny-label">Ilha atual</span>
        <h2 data-phase-title></h2>
        <p data-phase-story></p>
        <div class="stat-grid">
          <div class="stat-box stat-lives"><span>Vidas</span><strong data-lives></strong></div>
          <div class="stat-box"><span>Meta</span><strong data-minpercent></strong></div>
          <div class="stat-box"><span>Acertos</span><strong data-score></strong></div>
        </div>
        <div class="quest-progress"><div data-quiz-progress></div></div>
        <p class="small-muted" data-question-count></p>
        <div class="flow-microcopy">Mantenha o casco firme: cada erro mostra uma armadilha e cada acerto ilumina a rota.</div>
      </aside>
      <article class="question-card glass-card">
        <div class="question-topline">
          <span class="badge-pill" data-question-index></span>
          <span class="badge-pill subtle" data-question-meta></span>
        </div>
        <h1 data-question-statement></h1>
        <div class="question-image-wrap" data-question-image-wrap>
          <img data-question-image alt="Imagem da questão" />
        </div>
        <div class="options-list" data-options-list></div>
        <div class="feedback-panel hidden" data-feedback-panel>
          <h3 data-feedback-title></h3>
          <p data-feedback-text></p>
          <p class="descriptor" data-feedback-descriptor></p>
          <button class="btn btn-primary" data-action="next-question">Continuar</button>
        </div>
      </article>
    </section>
  </template>

  <template id="resultTemplate">
    <section class="result-card glass-card fade-in">
      <div class="result-icon premium-medal" data-result-icon></div>
      <span class="kicker" data-result-kicker></span>
      <h1 data-result-title></h1>
      <p data-result-message></p>
      <div class="result-stars" data-result-stars></div>
      <div class="result-stats">
        <div><span>Acertos</span><strong data-result-score></strong></div>
        <div><span>Aproveitamento</span><strong data-result-percent></strong></div>
        <div><span>Meta</span><strong data-result-target></strong></div>
        <div><span>XP da rodada</span><strong data-result-xp></strong></div>
        <div><span>Moedas</span><strong data-result-coins></strong></div>
      </div>
      <div class="rank-unlock" data-rank-unlock></div>
      <div class="reward-unlock" data-reward-unlock></div>
      <div class="hero-actions center-actions">
        <button class="btn btn-primary" data-action="result-main"></button>
        <button class="btn btn-soft" data-action="back-home">Voltar ao mapa</button>
      </div>
    </section>
  </template>

  <script src="app-quimica.js?v=3"></script>
</body>
</html>
